# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "RMK Keyboard"
product_name = "RMK Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "esp32c3"

[matrix]
# Row and col pins are mandatory    
matrix_type = "direct_pin"
direct_pins = [["GPIO1", "GPIO2", "GPIO3", "GPIO4"]]
# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true

[layout]
rows = 1
cols = 4
layers = 1
keymap = [
    [
        ["A", "B", "C", "D"],
    ],
]
